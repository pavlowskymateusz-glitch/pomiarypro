<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>PomiaryPro</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Libs (CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
  --bg:           #F7F6F2;
  --canvas-bg:    #FAFAF7;
  --white:        #FFFFFF;
  --ink:          #1A1A18;
  --ink2:         #6B6B66;
  --ink3:         #ADADAA;
  --accent:       #2563EB;
  --accent-light: #EFF6FF;
  --accent-mid:   #BFDBFE;
  --danger:       #DC2626;
  --border:       #E5E4DF;
  --border2:      #D0CFC9;
  --panel:        #FFFFFF;
  --r:            8px;
  --r-lg:         12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); height: 100vh; overflow: hidden; touch-action: none; user-select: none; }
#app { display: flex; flex-direction: column; height: 100vh; }

/* ── TOPBAR ── */
.topbar { display:flex; align-items:center; gap:0; background:var(--panel); border-bottom:1px solid var(--border); height:52px; padding:0 14px; flex-shrink:0; z-index:10; overflow-x:auto; }
.logo { font-size:15px; font-weight:700; color:var(--ink); letter-spacing:-.3px; margin-right:16px; white-space:nowrap; flex-shrink:0; }
.logo-dot { color:var(--accent); }
.tg { display:flex; align-items:center; gap:2px; padding:0 10px; border-right:1px solid var(--border); flex-shrink:0; }
.tb { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; width:48px; height:40px; border-radius:var(--r); border:1.5px solid transparent; background:transparent; cursor:pointer; transition:background 120ms,border-color 120ms; flex-shrink:0; touch-action:manipulation; }
.tb:hover { background:var(--bg); }
.tb.active { background:var(--accent-light); border-color:var(--accent-mid); }
.tb svg { width:17px; height:17px; stroke:var(--ink2); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.tb.active svg { stroke:var(--accent); }
.tb.red svg { stroke:var(--danger); }
.tb-lbl { font-size:7.5px; font-weight:600; color:var(--ink3); letter-spacing:.4px; text-transform:uppercase; }
.tb.active .tb-lbl { color:var(--accent); }
.spacer { flex:1; }
.sess-badge { font-size:11px; font-weight:600; color:var(--accent); background:var(--accent-light); border:1px solid var(--accent-mid); border-radius:20px; padding:4px 12px; white-space:nowrap; flex-shrink:0; }
.btn-pdf { margin-left:10px; height:34px; padding:0 14px; background:var(--accent); color:#fff; border:none; border-radius:var(--r); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; flex-shrink:0; touch-action:manipulation; }

/* ── MAIN ── */
.main { display:flex; flex:1; overflow:hidden; }
.canvas-wrap { flex:1; position:relative; overflow:hidden; background:var(--canvas-bg); }
#c { display:block; width:100%; height:100%; touch-action:none; }
.hint-bar { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); background:rgba(26,26,24,.72); color:#fff; font-size:11px; font-weight:500; padding:5px 16px; border-radius:20px; pointer-events:none; white-space:nowrap; opacity:0; transition:opacity .35s; }
.hint-bar.show { opacity:1; }

/* ── SIDE PANEL ── */
.side { width:240px; flex-shrink:0; background:var(--panel); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; padding:14px; gap:12px; }
.p-lbl { font-size:9px; font-weight:700; color:var(--ink3); letter-spacing:1.5px; text-transform:uppercase; padding-bottom:6px; border-bottom:1px solid var(--border); }
.no-sel { text-align:center; padding:28px 0; color:var(--ink3); font-size:12px; font-weight:500; line-height:1.7; }
.no-sel svg { display:block; margin:0 auto 10px; width:28px; height:28px; stroke:var(--ink3); fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
.dim-row { display:flex; align-items:center; gap:8px; }
.dim-key { font-size:11px; font-weight:600; color:var(--ink2); width:34px; flex-shrink:0; }
.dim-field { flex:1; display:flex; align-items:center; background:var(--bg); border:1.5px solid var(--border); border-radius:var(--r); padding:0 8px; height:36px; gap:4px; transition:border-color 120ms; }
.dim-field:focus-within { border-color:var(--accent); background:#fff; }
.dim-field input { flex:1; border:none; background:transparent; font-family:'DM Mono',monospace; font-size:14px; font-weight:500; color:var(--ink); outline:none; min-width:0; text-align:right; }
.dim-field input::placeholder { color:var(--ink3); }
.dim-unit { font-size:10px; font-weight:600; color:var(--ink3); flex-shrink:0; }
.lbl-area { width:100%; border:1.5px solid var(--border); border-radius:var(--r); padding:8px 10px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:var(--ink); background:var(--bg); outline:none; resize:none; transition:border-color 120ms; min-height:60px; }
.lbl-area:focus { border-color:var(--accent); background:#fff; }
.lbl-area::placeholder { color:var(--ink3); }
.apply-btn { width:100%; height:36px; background:var(--accent); color:#fff; border:none; border-radius:var(--r); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; touch-action:manipulation; }
.del-btn { width:100%; height:34px; background:transparent; color:var(--danger); border:1.5px solid #FCA5A5; border-radius:var(--r); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; }

/* ── QR OVERLAY ── */
.qr-overlay { display:none; position:absolute; inset:0; background:rgba(0,0,0,.5); align-items:center; justify-content:center; z-index:50; }
.qr-overlay.open { display:flex; }
.qr-box { background:#fff; border-radius:var(--r-lg); padding:28px; text-align:center; width:300px; box-shadow:0 8px 32px rgba(0,0,0,.18); }
.qr-box h3 { font-size:14px; font-weight:700; color:var(--ink); margin-bottom:4px; }
.qr-box p { font-size:11px; color:var(--ink3); margin-bottom:20px; }
#qr-render { display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
.qr-counter { font-size:22px; font-weight:700; color:var(--accent); font-family:'DM Mono',monospace; margin-bottom:4px; }
.qr-counter-lbl { font-size:10px; color:var(--ink3); font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:20px; }
.qr-close { width:100%; height:40px; background:var(--bg); border:1.5px solid var(--border2); border-radius:var(--r); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; color:var(--ink2); cursor:pointer; }

/* ── BOTTOM ── */
.bottom { background:var(--panel); border-top:1px solid var(--border); display:flex; align-items:center; padding:0 14px; gap:10px; height:66px; flex-shrink:0; }
.qr-btn { width:50px; height:50px; border-radius:var(--r-lg); background:var(--bg); border:1.5px solid var(--border2); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; flex-shrink:0; touch-action:manipulation; transition:border-color 120ms; }
.qr-btn:hover { border-color:var(--accent); }
.qr-btn svg { width:18px; height:18px; stroke:var(--accent); fill:none; stroke-width:2; }
.qr-btn span { font-size:7px; font-weight:700; color:var(--accent); letter-spacing:.3px; }
.photo-tray { flex:1; display:flex; align-items:center; gap:6px; overflow-x:auto; padding:2px 0; }
.photo-tray::-webkit-scrollbar { height:2px; }
.photo-tray::-webkit-scrollbar-thumb { background:var(--accent-mid); border-radius:2px; }
.p-chip { flex-shrink:0; background:var(--bg); border:1px solid var(--border2); border-radius:6px; padding:4px 10px; font-size:10px; font-weight:600; color:var(--ink2); white-space:nowrap; font-family:'DM Mono',monospace; cursor:pointer; }
.p-chip:hover { border-color:var(--accent); }
.empty-tray { font-size:11px; color:var(--ink3); font-weight:500; }
.send-btn { height:50px; padding:0 18px; background:var(--accent); color:#fff; border:none; border-radius:var(--r-lg); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; flex-shrink:0; touch-action:manipulation; }
</style>
</head>
<body>
<div id="app">

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">Pomiary<span class="logo-dot">Pro</span></div>

  <div class="tg">
    <button class="tb active" id="tb-select" onclick="setMode('select')" title="Zaznacz / przesuń / skaluj">
      <svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z"/></svg>
      <span class="tb-lbl">Wybór</span>
    </button>
  </div>

  <div class="tg">
    <button class="tb" id="tb-rect" onclick="setMode('rect')">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
      <span class="tb-lbl">Prost.</span>
    </button>
    <button class="tb" id="tb-circle" onclick="setMode('circle')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
      <span class="tb-lbl">Koło</span>
    </button>
    <button class="tb" id="tb-line" onclick="setMode('line')">
      <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"/></svg>
      <span class="tb-lbl">Linia</span>
    </button>
  </div>

  <div class="tg">
    <button class="tb red" onclick="Canvas.undo()">
      <svg viewBox="0 0 24 24"><polyline points="9,14 4,9 9,4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
      <span class="tb-lbl" style="color:var(--danger)">Cofnij</span>
    </button>
    <button class="tb red" onclick="confirmClear()">
      <svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      <span class="tb-lbl" style="color:var(--danger)">Czyść</span>
    </button>
  </div>

  <div class="spacer"></div>
  <div class="sess-badge" id="sess-badge">Nowa sesja</div>
  <button class="btn-pdf" id="btn-pdf" onclick="exportPDF()">Eksport PDF</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CANVAS -->
  <div class="canvas-wrap" id="cwrap">
    <canvas id="c"></canvas>
    <div class="hint-bar" id="hint"></div>

    <!-- QR OVERLAY -->
    <div class="qr-overlay" id="qr-overlay">
      <div class="qr-box">
        <h3>Zeskanuj telefonem</h3>
        <p>Otwórz aparat i zeskanuj kod — przejdziesz do strony dodawania zdjęć.</p>
        <div id="qr-render"></div>
        <div class="qr-counter" id="qr-count">0</div>
        <div class="qr-counter-lbl">odebrano zdjęć</div>
        <button class="qr-close" onclick="closeQR()">Zamknij</button>
      </div>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side" id="side">

    <div id="panel-empty">
      <div class="no-sel">
        <svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z"/></svg>
        Zaznacz element<br>aby edytować<br>wymiary i etykietę
      </div>
    </div>

    <div id="panel-editor" style="display:none">

      <div>
        <div class="p-lbl" style="margin-bottom:10px">Wymiary</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div class="dim-row">
            <span class="dim-key" id="lbl-w">Szer.</span>
            <div class="dim-field">
              <input id="inp-w" type="number" min="1" placeholder="—" inputmode="decimal">
              <span class="dim-unit">mm</span>
            </div>
          </div>
          <div class="dim-row" id="row-h">
            <span class="dim-key" id="lbl-h">Wys.</span>
            <div class="dim-field">
              <input id="inp-h" type="number" min="1" placeholder="—" inputmode="decimal">
              <span class="dim-unit">mm</span>
            </div>
          </div>
        </div>
      </div>

      <div>
        <div class="p-lbl" style="margin-bottom:10px">Etykieta</div>
        <textarea id="inp-lbl" class="lbl-area" placeholder="np. witryna lewa, drzwi główne…" rows="3"></textarea>
      </div>

      <button class="apply-btn" onclick="applyEdits()">Zastosuj ↵</button>
      <button class="del-btn"   onclick="Canvas.deleteSelected();updatePanel()">Usuń element</button>

    </div>

  </div>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <button class="qr-btn" onclick="openQR()">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="17" y="17" width="4" height="4" rx="1"/></svg>
    <span>QR FOTO</span>
  </button>
  <div class="photo-tray" id="photo-tray">
    <span class="empty-tray">Brak zdjęć — zeskanuj QR telefonem</span>
  </div>
  <button class="send-btn" onclick="sendReport()">Wyślij raport</button>
</div>

</div><!-- #app -->

<!-- Własne moduły -->
<script src="../../config.js"></script>
<script src="src/js/canvas.js"></script>
<script src="src/js/session.js"></script>
<script src="src/js/polling.js"></script>
<script src="src/js/offlineQueue.js"></script>
<script src="src/js/pdf.js"></script>

<script>
// ── BOOT ──────────────────────────────────────────────────────────────────────
let _photos = [];
let _qrOpen = false;

document.addEventListener('DOMContentLoaded', () => {
  // Init canvas
  Canvas.init(document.getElementById('c'), onShapeSelected);

  // Przywróć sesję lub utwórz nową
  const restored = Session.restore();
  if (restored) {
    document.getElementById('sess-badge').textContent = restored.clientName;
    startPolling(restored.sessionId);
  } else {
    const name = prompt('Podaj nazwę klienta / obiektu:') || 'Nowa sesja';
    const sess  = Session.create(name);
    document.getElementById('sess-badge').textContent = sess.clientName;
    startPolling(sess.sessionId);
  }

  OfflineQueue.init();
});

// ── TRYBY NARZĘDZI ────────────────────────────────────────────────────────────
function setMode(m) {
  Canvas.setMode(m);
  ['select','rect','circle','line'].forEach(id => {
    document.getElementById('tb-' + id)?.classList.toggle('active', id === m);
  });
  const hints = {
    rect:   'Przeciągnij aby narysować prostokąt',
    circle: 'Przeciągnij aby narysować koło',
    line:   'Przeciągnij aby narysować linię — snap do węzłów',
  };
  if (hints[m]) showHint(hints[m]);
}

function showHint(msg, ms = 2500) {
  const h = document.getElementById('hint');
  h.textContent = msg; h.classList.add('show');
  clearTimeout(h._t); h._t = setTimeout(() => h.classList.remove('show'), ms);
}

function confirmClear() {
  if (confirm('Wyczyścić płótno?')) { Canvas.clearAll(); updatePanel(); }
}

// ── PANEL BOCZNY ──────────────────────────────────────────────────────────────
function onShapeSelected(shape) {
  updatePanel(shape);
}

function updatePanel(shape) {
  shape = shape || Canvas.getSelected();
  const empty  = document.getElementById('panel-empty');
  const editor = document.getElementById('panel-editor');
  if (!shape) { empty.style.display = 'block'; editor.style.display = 'none'; return; }
  empty.style.display = 'none'; editor.style.display = 'flex';
  editor.style.flexDirection = 'column'; editor.style.gap = '12px';

  const rowH = document.getElementById('row-h');
  document.getElementById('lbl-w').textContent = shape.type === 'circle' ? 'Śred.' : shape.type === 'line' ? 'Dług.' : 'Szer.';
  rowH.style.display = (shape.type === 'circle' || shape.type === 'line') ? 'none' : 'flex';

  document.getElementById('inp-w').value = shape.dimW || '';
  document.getElementById('inp-h').value = shape.dimH || '';
  document.getElementById('inp-lbl').value = shape.label || '';
}

function applyEdits() {
  const s = Canvas.getSelected();
  if (!s) return;
  const w   = parseFloat(document.getElementById('inp-w').value) || 0;
  const h   = parseFloat(document.getElementById('inp-h').value) || 0;
  const lbl = document.getElementById('inp-lbl').value.trim();
  Canvas.updateShape(s.id, {
    dimW:  w   > 0 ? Math.round(w) : s.dimW,
    dimH:  h   > 0 ? Math.round(h) : s.dimH,
    label: lbl,
  });
  showHint('Zmiany zastosowane ✓');
}

// ── QR ────────────────────────────────────────────────────────────────────────
async function openQR() {
  _qrOpen = true;
  document.getElementById('qr-overlay').classList.add('open');
  const el = document.getElementById('qr-render');
  el.innerHTML = '';
  try {
    await Session.renderQR(el, 200);
  } catch (e) {
    el.textContent = 'Brak sesji — odśwież stronę';
  }
  updateQRCounter();
}

function closeQR() {
  _qrOpen = false;
  document.getElementById('qr-overlay').classList.remove('open');
}

function updateQRCounter() {
  document.getElementById('qr-count').textContent = _photos.length;
}

// ── POLLING ───────────────────────────────────────────────────────────────────
function startPolling(sessionId) {
  Polling.start(sessionId, onNewPhotos, onPollError);
}

function onNewPhotos(photos) {
  photos.forEach(p => {
    _photos.push(p);
    addPhotoChip(p);
  });
  if (_qrOpen) updateQRCounter();
  showHint(`📸 Nowe zdjęcie: ${photos[photos.length - 1].description}`);
}

function onPollError(err) {
  console.warn('Błąd pollingu:', err.message);
}

function addPhotoChip(photo) {
  const tray = document.getElementById('photo-tray');
  const empty = tray.querySelector('.empty-tray');
  if (empty) empty.remove();
  const chip = document.createElement('div');
  chip.className = 'p-chip';
  chip.title = photo.driveUrl || '';
  chip.textContent = photo.description || photo.timestamp.slice(0, 10);
  if (photo.driveUrl) chip.onclick = () => window.open(photo.driveUrl, '_blank');
  tray.appendChild(chip);
}

// ── EKSPORT PDF ───────────────────────────────────────────────────────────────
function exportPDF() {
  PDFGenerator.generate({
    clientName: Session.getClientName(),
    date:       new Date().toLocaleDateString('pl-PL'),
    sessionId:  Session.getSessionId(),
    canvasEl:   Canvas.getCanvas(),
    photos:     _photos,
  });
}

// ── WYŚLIJ RAPORT ─────────────────────────────────────────────────────────────
function sendReport() {
  exportPDF();
  showHint('Raport wygenerowany i pobrany ✓', 3000);
}
</script>
</body>
</html>
