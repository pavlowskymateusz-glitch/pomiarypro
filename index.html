<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PomiaryPro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --ac:#2563EB;--al:#EFF6FF;--am:#BFDBFE;--red:#DC2626;
  --ink:#1A1A18;--ink2:#6B6B66;--ink3:#ADADAA;
  --bg:#F7F6F2;--wh:#FFFFFF;--br:#E5E4DF;--br2:#D0CFC9;
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg)}

/* ── EKRAN STARTOWY ── */
#ss{
  position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.ssbox{background:var(--wh);border-radius:16px;border:1px solid var(--br);padding:36px 28px;width:100%;max-width:380px;text-align:center;}
.sslogo{font-size:28px;font-weight:700;color:var(--ink);margin-bottom:6px}
.sslogo b{color:var(--ac)}
.sssub{font-size:13px;color:var(--ink3);margin-bottom:24px}
.ssinp{display:block;width:100%;border:2px solid var(--br);border-radius:var(--r);padding:14px;margin-bottom:14px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--ink);background:var(--bg);outline:none;}
.ssinp:focus{border-color:var(--ac);background:var(--wh)}
.ssbtn{display:block;width:100%;height:52px;background:var(--ac);color:var(--wh);border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;}

/* ── APP ── */
#app{
  display:grid;
  grid-template-rows:52px 1fr 56px;
  width:100vw;height:100vh;
  overflow:hidden;
}

/* ── TOPBAR ── */
.topbar{
  grid-row:1;
  display:flex;align-items:center;
  background:var(--wh);border-bottom:1px solid var(--br);
  padding:0 8px;gap:0;overflow-x:auto;overflow-y:hidden;
}
.logo{font-size:14px;font-weight:700;color:var(--ink);margin-right:8px;white-space:nowrap;flex-shrink:0}
.logo b{color:var(--ac)}
.tg{display:flex;align-items:center;gap:1px;padding:0 5px;border-right:1px solid var(--br);flex-shrink:0}
.tb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:42px;height:36px;border-radius:6px;border:1.5px solid transparent;background:transparent;cursor:pointer;flex-shrink:0;touch-action:manipulation;}
.tb.on{background:var(--al);border-color:var(--am)}
.tb svg{width:15px;height:15px;stroke:var(--ink2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tb.on svg{stroke:var(--ac)}
.tb.rd svg{stroke:var(--red)}
.tl{font-size:7px;font-weight:600;color:var(--ink3);letter-spacing:.3px;text-transform:uppercase}
.tb.on .tl{color:var(--ac)}
.sp{flex:1}

/* Badge + przyciski akcji w topbarze */
.badge{font-size:10px;font-weight:600;color:var(--ac);background:var(--al);border:1px solid var(--am);border-radius:20px;padding:3px 8px;white-space:nowrap;flex-shrink:0;max-width:110px;overflow:hidden;text-overflow:ellipsis;}
.icon-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  width:42px;height:36px;border-radius:6px;border:1.5px solid var(--br2);
  background:var(--bg);cursor:pointer;flex-shrink:0;margin-left:4px;
  touch-action:manipulation;
}
.icon-btn svg{width:16px;height:16px;stroke:var(--ac);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon-btn span{font-size:6.5px;font-weight:700;color:var(--ac);letter-spacing:.3px;text-transform:uppercase}
.icon-btn.new-btn svg{stroke:var(--ink2)}
.icon-btn.new-btn span{color:var(--ink2)}
.pdf-btn{
  height:32px;padding:0 10px;flex-shrink:0;margin-left:4px;
  background:var(--ac);color:var(--wh);border:none;border-radius:6px;
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;
  white-space:nowrap;touch-action:manipulation;
}

/* ── MAIN ── */
.main{
  grid-row:2;
  display:flex;overflow:hidden;min-height:0;
}
.cwrap{flex:1;min-width:0;position:relative;overflow:hidden;background:#FAFAF7;}
#c{display:block;width:100%;height:100%;touch-action:none}
.hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(26,26,24,.7);color:#fff;font-size:11px;padding:4px 14px;border-radius:20px;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .3s;}
.hint.on{opacity:1}

/* ── QR OVERLAY ── */
.qrov{display:none;position:absolute;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:50;}
.qrov.open{display:flex}
.qrbox{background:var(--wh);border-radius:12px;padding:22px;text-align:center;width:270px;max-height:90vh;overflow-y:auto;}
.qrbox h3{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px}
.qrbox p{font-size:11px;color:var(--ink3);margin-bottom:12px}
#qrel{display:flex;align-items:center;justify-content:center;margin:0 auto 10px;min-height:170px}
.qrcnt{font-size:24px;font-weight:700;color:var(--ac);font-family:'DM Mono',monospace}
.qrcntl{font-size:10px;color:var(--ink3);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
.qrcls{width:100%;height:36px;background:var(--bg);border:1.5px solid var(--br2);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer;}

/* ── SIDE ── */
.side{width:190px;flex-shrink:0;background:var(--wh);border-left:1px solid var(--br);display:flex;flex-direction:column;overflow-y:auto;padding:10px;gap:10px;}
.plbl{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:1.5px;text-transform:uppercase;padding-bottom:5px;border-bottom:1px solid var(--br)}
.nosel{text-align:center;padding:20px 0;color:var(--ink3);font-size:11px;line-height:1.6}
.nosel svg{display:block;margin:0 auto 8px;width:24px;height:24px;stroke:var(--ink3);fill:none;stroke-width:1.5;stroke-linecap:round}
.dr{display:flex;align-items:center;gap:6px}
.dk{font-size:11px;font-weight:600;color:var(--ink2);width:30px;flex-shrink:0}
.df{flex:1;display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--br);border-radius:6px;padding:0 6px;height:32px;gap:3px;}
.df:focus-within{border-color:var(--ac);background:var(--wh)}
.df input{flex:1;border:none;background:transparent;font-family:'DM Mono',monospace;font-size:13px;color:var(--ink);outline:none;min-width:0;text-align:right;}
.df input::placeholder{color:var(--ink3)}
.du{font-size:10px;color:var(--ink3);flex-shrink:0}
.la{width:100%;border:1.5px solid var(--br);border-radius:6px;padding:7px 8px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);background:var(--bg);outline:none;resize:none;min-height:50px;}
.la:focus{border-color:var(--ac);background:var(--wh)}
.la::placeholder{color:var(--ink3)}
.ab{width:100%;height:32px;background:var(--ac);color:var(--wh);border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;}
.db{width:100%;height:30px;background:transparent;color:var(--red);border:1.5px solid #FCA5A5;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;margin-top:2px;touch-action:manipulation;}

/* ── BOTTOM ── */
.bottom{
  grid-row:3;
  display:flex;align-items:center;
  background:var(--wh);border-top:1px solid var(--br);
  padding:0 10px;gap:8px;
}
.ptray{flex:1;min-width:0;display:flex;align-items:center;gap:6px;overflow-x:auto;padding:2px 0;}
.ptray::-webkit-scrollbar{height:2px}
.ptray::-webkit-scrollbar-thumb{background:var(--am)}
.pchip{flex-shrink:0;background:var(--bg);border:1px solid var(--br2);border-radius:5px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--ink2);white-space:nowrap;font-family:'DM Mono',monospace;cursor:pointer;}
.etray{font-size:10px;color:var(--ink3)}
.sndbtn{height:42px;padding:0 12px;flex-shrink:0;background:var(--ac);color:var(--wh);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;touch-action:manipulation;}
</style>
</head>
<body>

<!-- EKRAN STARTOWY -->
<div id="ss">
  <div class="ssbox">
    <div class="sslogo">Pomiary<b>Pro</b></div>
    <div class="sssub">Wpisz nazwę klienta i rozpocznij</div>
    <input class="ssinp" id="ssinp" type="text"
      placeholder="np. Kowalski – Biurowiec"
      autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="words">
    <button class="ssbtn" id="ssbtn">Rozpocznij pomiar →</button>
  </div>
</div>

<!-- APLIKACJA -->
<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">Pomiary<b>Pro</b></div>

    <div class="tg">
      <button class="tb on" id="tb-select" onclick="setMode('select')">
        <svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z"/></svg>
        <span class="tl">Wybór</span>
      </button>
    </div>

    <div class="tg">
      <button class="tb" id="tb-rect" onclick="setMode('rect')">
        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
        <span class="tl">Prost.</span>
      </button>
      <button class="tb" id="tb-circle" onclick="setMode('circle')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
        <span class="tl">Koło</span>
      </button>
      <button class="tb" id="tb-line" onclick="setMode('line')">
        <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"/></svg>
        <span class="tl">Linia</span>
      </button>
    </div>

    <div class="tg">
      <button class="tb rd" onclick="Canvas.undo()">
        <svg viewBox="0 0 24 24"><polyline points="9,14 4,9 9,4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
        <span class="tl" style="color:var(--red)">Cofnij</span>
      </button>
      <button class="tb rd" onclick="if(confirm('Wyczyścić?')){Canvas.clearAll();updatePanel()}">
        <svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        <span class="tl" style="color:var(--red)">Czyść</span>
      </button>
    </div>

    <div class="sp"></div>

    <!-- Nazwa klienta -->
    <div class="badge" id="badge">—</div>

    <!-- QR w topbarze — zawsze widoczny -->
    <button class="icon-btn" id="qrbtn" title="Zdjęcia QR">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="17" y="17" width="4" height="4" rx="1"/></svg>
      <span>QR</span>
    </button>

    <!-- Nowy klient -->
    <button class="icon-btn new-btn" id="newbtn" title="Nowy klient">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      <span>Nowy</span>
    </button>

    <button class="pdf-btn" onclick="exportPDF()">PDF</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="cwrap" id="cwrap">
      <canvas id="c"></canvas>
      <div class="hint" id="hint"></div>

      <div class="qrov" id="qrov">
        <div class="qrbox">
          <h3>Zeskanuj telefonem</h3>
          <p>Otwórz aparat i zeskanuj kod</p>
          <div id="qrel"></div>
          <div class="qrcnt" id="qrcnt">0</div>
          <div class="qrcntl">odebrano zdjęć</div>
          <button class="qrcls" onclick="closeQR()">Zamknij</button>
        </div>
      </div>
    </div>

    <div class="side">
      <div id="pe">
        <div class="nosel">
          <svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z"/></svg>
          Zaznacz element<br>aby edytować
        </div>
      </div>
      <div id="ped" style="display:none;flex-direction:column;gap:9px">
        <div>
          <div class="plbl" style="margin-bottom:8px">Wymiary</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <div class="dr">
              <span class="dk" id="lw">Szer.</span>
              <div class="df"><input id="iw" type="number" min="1" placeholder="—" inputmode="decimal"><span class="du">mm</span></div>
            </div>
            <div class="dr" id="rh">
              <span class="dk">Wys.</span>
              <div class="df"><input id="ih" type="number" min="1" placeholder="—" inputmode="decimal"><span class="du">mm</span></div>
            </div>
          </div>
        </div>
        <div>
          <div class="plbl" style="margin-bottom:8px">Etykieta</div>
          <textarea id="il" class="la" placeholder="np. witryna lewa…" rows="3"></textarea>
        </div>
        <button class="ab" onclick="applyEdits()">Zastosuj ↵</button>
        <button class="db" onclick="Canvas.deleteSelected();updatePanel()">Usuń</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM — tylko pasek zdjęć i wyślij -->
  <div class="bottom">
    <div class="ptray" id="ptray">
      <span class="etray">Brak zdjęć — użyj przycisku QR w górnym pasku</span>
    </div>
    <button class="sndbtn" onclick="sendReport()">Wyślij raport</button>
  </div>

</div>

<script src="config.js?v=9"></script>
<script src="src/js/canvas.js?v=9"></script>
<script src="src/js/session.js?v=9"></script>
<script src="src/js/polling.js?v=9"></script>
<script src="src/js/offlineQueue.js?v=9"></script>
<script src="src/js/pdf.js?v=9"></script>
<script>
(function(){
  var photos = [];
  var qrOpen = false;
  var ready = false;
  var canvasInited = false;

  function boot(clientName) {
    if (ready) return;
    ready = true;
    document.getElementById('ss').style.display = 'none';
    document.getElementById('badge').textContent = clientName;
    if (!canvasInited) {
      Canvas.init(document.getElementById('c'), updatePanel);
      canvasInited = true;
    }
    Polling.start(Session.getSessionId(), function(np) {
      np.forEach(function(p){ photos.push(p); addChip(p); });
      if (qrOpen) document.getElementById('qrcnt').textContent = photos.length;
      showHint('📸 Nowe zdjęcie: ' + (np[0].description || ''));
    });
    OfflineQueue.init();
  }

  function newSession() {
    if (!confirm('Rozpoczac nowa sesje dla nowego klienta?\nBiezacy szkic zostanie wyczyszczony.')) return;
    Session.clear();
    Polling.reset();
    photos = [];
    canvasInited = true; // canvas juz istnieje, nie inicjuj ponownie
    ready = false;
    document.getElementById('ptray').innerHTML = '<span class="etray">Brak zdiec — uzyj przycisku QR w gornym pasku</span>';
    Canvas.clearAll();
    updatePanel();
    document.getElementById('ss').style.display = 'flex';
    document.getElementById('ssinp').value = '';
    document.getElementById('badge').textContent = '—';
    setTimeout(function(){ document.getElementById('ssinp').focus(); }, 100);
  }

  // Ekran startowy
  document.getElementById('ssbtn').addEventListener('click', function(){
    var n = (document.getElementById('ssinp').value || '').trim() || 'Klient';
    var sess = Session.create(n);
    boot(sess.clientName);
  });
  document.getElementById('ssinp').addEventListener('keydown', function(e){
    if (e.key === 'Enter') document.getElementById('ssbtn').click();
  });
  document.getElementById('newbtn').addEventListener('click', newSession);

  // Przywróć sesję
  var r = Session.restore();
  if (r) { boot(r.clientName); }

  // Tryby
  window.setMode = function(m) {
    Canvas.setMode(m);
    ['select','rect','circle','line'].forEach(function(id){
      var el = document.getElementById('tb-'+id);
      if(el) el.classList.toggle('on', id===m);
    });
  };

  function showHint(msg) {
    var h = document.getElementById('hint');
    h.textContent = msg; h.classList.add('on');
    clearTimeout(h._t); h._t = setTimeout(function(){ h.classList.remove('on'); }, 2500);
  }

  window.updatePanel = function(shape) {
    shape = shape || Canvas.getSelected();
    var pe = document.getElementById('pe');
    var ed = document.getElementById('ped');
    if (!shape) { pe.style.display='block'; ed.style.display='none'; return; }
    pe.style.display='none'; ed.style.display='flex';
    document.getElementById('lw').textContent = shape.type==='circle'?'Śred.':shape.type==='line'?'Dług.':'Szer.';
    document.getElementById('rh').style.display = (shape.type==='circle'||shape.type==='line')?'none':'flex';
    document.getElementById('iw').value = shape.dimW || '';
    document.getElementById('ih').value = shape.dimH || '';
    document.getElementById('il').value = shape.label || '';
  };

  window.applyEdits = function() {
    var s = Canvas.getSelected(); if (!s) return;
    Canvas.updateShape(s.id, {
      dimW: parseFloat(document.getElementById('iw').value) || s.dimW,
      dimH: parseFloat(document.getElementById('ih').value) || s.dimH,
      label: document.getElementById('il').value.trim()
    });
    showHint('Zapisano ✓');
  };

  // QR
  document.getElementById('qrbtn').addEventListener('click', function(){
    if (!ready) { showHint('Najpierw wpisz nazwę klienta'); return; }
    qrOpen = true;
    document.getElementById('qrov').classList.add('open');
    var el = document.getElementById('qrel');
    el.innerHTML = '';
    try { Session.renderQR(el, 180); } catch(e) { el.textContent = 'Błąd: '+e.message; }
    document.getElementById('qrcnt').textContent = photos.length;
  });

  window.closeQR = function() {
    qrOpen = false;
    document.getElementById('qrov').classList.remove('open');
  };

  window.exportPDF = function() {
    if (!ready) return;
    PDFGenerator.generate({
      clientName: Session.getClientName(),
      date: new Date().toLocaleDateString('pl-PL'),
      sessionId: Session.getSessionId(),
      canvasEl: Canvas.getCanvas(),
      photos: photos
    });
  };

  window.sendReport = function() { exportPDF(); showHint('PDF pobrany ✓'); };

  function addChip(p) {
    var t = document.getElementById('ptray');
    var e = t.querySelector('.etray'); if(e) e.remove();
    var c = document.createElement('div'); c.className='pchip';
    c.textContent = p.description || p.timestamp.slice(0,10);
    if(p.driveUrl) c.onclick = function(){ window.open(p.driveUrl,'_blank'); };
    t.appendChild(c);
  }
})();
</script>
</body>
</html>
