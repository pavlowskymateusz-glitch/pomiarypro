<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>PomiaryPro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#F7F6F2;--canvas-bg:#FAFAF7;--ink:#1A1A18;--ink2:#6B6B66;--ink3:#ADADAA;
  --accent:#2563EB;--al:#EFF6FF;--am:#BFDBFE;--danger:#DC2626;
  --border:#E5E4DF;--border2:#D0CFC9;--panel:#FFFFFF;--r:8px;--rlg:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);height:100vh;overflow:hidden;user-select:none}
#app{display:flex;flex-direction:column;height:100vh}

/* EKRAN STARTOWY */
#start-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:200;
}
.sbox{
  background:var(--panel);border-radius:16px;border:1px solid var(--border);
  padding:40px 32px;width:360px;max-width:92vw;text-align:center;
  box-shadow:0 4px 24px rgba(0,0,0,.08);
}
.slogo{font-size:30px;font-weight:700;color:var(--ink);margin-bottom:6px}
.slogo span{color:var(--accent)}
.ssub{font-size:13px;color:var(--ink3);margin-bottom:28px}
.sinput{
  display:block;width:100%;
  border:1.5px solid var(--border);border-radius:var(--r);
  padding:14px 16px;margin-bottom:16px;
  font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;color:var(--ink);
  background:var(--bg);outline:none;transition:border-color 120ms;
}
.sinput:focus{border-color:var(--accent);background:#fff}
.sbtn{
  display:block;width:100%;height:54px;
  background:var(--accent);color:#fff;border:none;border-radius:var(--r);
  font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;
  cursor:pointer;letter-spacing:.2px;
}
.sbtn:active{opacity:.85}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:0;background:var(--panel);border-bottom:1px solid var(--border);height:52px;padding:0 12px;flex-shrink:0;z-index:10;overflow-x:auto}
.logo{font-size:15px;font-weight:700;color:var(--ink);margin-right:14px;white-space:nowrap;flex-shrink:0}
.logo span{color:var(--accent)}
.tg{display:flex;align-items:center;gap:2px;padding:0 8px;border-right:1px solid var(--border);flex-shrink:0}
.tb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:46px;height:38px;border-radius:var(--r);border:1.5px solid transparent;background:transparent;cursor:pointer;transition:background 100ms;flex-shrink:0}
.tb:hover{background:var(--bg)}
.tb.active{background:var(--al);border-color:var(--am)}
.tb svg{width:16px;height:16px;stroke:var(--ink2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tb.active svg{stroke:var(--accent)}
.tb.red svg{stroke:var(--danger)}
.tbl{font-size:7px;font-weight:600;color:var(--ink3);letter-spacing:.4px;text-transform:uppercase}
.tb.active .tbl{color:var(--accent)}
.sp{flex:1}
.sbadge{font-size:11px;font-weight:600;color:var(--accent);background:var(--al);border:1px solid var(--am);border-radius:20px;padding:4px 12px;white-space:nowrap;flex-shrink:0}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden}
.cwrap{flex:1;position:relative;overflow:hidden;background:var(--canvas-bg)}
#c{display:block;width:100%;height:100%;touch-action:none}
.hintbar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(26,26,24,.72);color:#fff;font-size:11px;font-weight:500;padding:5px 16px;border-radius:20px;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .35s}
.hintbar.show{opacity:1}

/* SIDE */
.side{width:230px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:14px;gap:12px}
.plbl{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:1.5px;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--border)}
.nosel{text-align:center;padding:28px 0;color:var(--ink3);font-size:12px;font-weight:500;line-height:1.7}
.nosel svg{display:block;margin:0 auto 10px;width:28px;height:28px;stroke:var(--ink3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.drow{display:flex;align-items:center;gap:8px}
.dkey{font-size:11px;font-weight:600;color:var(--ink2);width:34px;flex-shrink:0}
.dfield{flex:1;display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);padding:0 8px;height:36px;gap:4px;transition:border-color 100ms}
.dfield:focus-within{border-color:var(--accent);background:#fff}
.dfield input{flex:1;border:none;background:transparent;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--ink);outline:none;min-width:0;text-align:right}
.dfield input::placeholder{color:var(--ink3)}
.dunit{font-size:10px;font-weight:600;color:var(--ink3);flex-shrink:0}
.larea{width:100%;border:1.5px solid var(--border);border-radius:var(--r);padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--ink);background:var(--bg);outline:none;resize:none;transition:border-color 100ms;min-height:58px}
.larea:focus{border-color:var(--accent);background:#fff}
.larea::placeholder{color:var(--ink3)}
.abtn{width:100%;height:36px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.dbtn{width:100%;height:34px;background:transparent;color:var(--danger);border:1.5px solid #FCA5A5;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer}

/* QR OVERLAY */
.qrov{display:none;position:absolute;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:50}
.qrov.open{display:flex}
.qrbox{background:#fff;border-radius:var(--rlg);padding:28px;text-align:center;width:300px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.qrbox h3{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px}
.qrbox p{font-size:11px;color:var(--ink3);margin-bottom:18px}
#qr-render{display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.qrcnt{font-size:26px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:4px}
.qrcntl{font-size:10px;color:var(--ink3);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:18px}
.qrcls{width:100%;height:40px;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer}

/* BOTTOM */
.bottom{background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;height:66px;flex-shrink:0}
.qrbtn{width:50px;height:50px;border-radius:var(--rlg);background:var(--bg);border:1.5px solid var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;flex-shrink:0;transition:border-color 100ms}
.qrbtn:hover{border-color:var(--accent)}
.qrbtn svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:2}
.qrbtn span{font-size:7px;font-weight:700;color:var(--accent);letter-spacing:.3px}
.ptray{flex:1;display:flex;align-items:center;gap:6px;overflow-x:auto;padding:2px 0}
.ptray::-webkit-scrollbar{height:2px}
.ptray::-webkit-scrollbar-thumb{background:var(--am);border-radius:2px}
.pchip{flex-shrink:0;background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:10px;font-weight:600;color:var(--ink2);white-space:nowrap;font-family:'DM Mono',monospace;cursor:pointer}
.pchip:hover{border-color:var(--accent)}
.etray{font-size:11px;color:var(--ink3);font-weight:500}
.sndbtn{height:50px;padding:0 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--rlg);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
</style>
</head>
<body>
<div id="app">

<!-- EKRAN STARTOWY -->
<div id="start-screen">
  <div class="sbox">
    <div class="slogo">Pomiary<span>Pro</span></div>
    <div class="ssub">Wpisz nazwę klienta i rozpocznij pomiar</div>
    <input class="sinput" id="start-input" type="text"
      placeholder="np. Kowalski – Biurowiec Alfa"
      autocomplete="off" spellcheck="false">
    <button class="sbtn" id="start-btn">Rozpocznij pomiar →</button>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">Pomiary<span>Pro</span></div>
  <div class="tg">
    <button class="tb active" id="tb-select" onclick="setMode('select')">
      <svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z"/></svg>
      <span class="tbl">Wybór</span>
    </button>
  </div>
  <div class="tg">
    <button class="tb" id="tb-rect" onclick="setMode('rect')">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
      <span class="tbl">Prost.</span>
    </button>
    <button class="tb" id="tb-circle" onclick="setMode('circle')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
      <span class="tbl">Koło</span>
    </button>
    <button class="tb" id="tb-line" onclick="setMode('line')">
      <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"/></svg>
      <span class="tbl">Linia</span>
    </button>
  </div>
  <div class="tg">
    <button class="tb red" onclick="Canvas.undo()">
      <svg viewBox="0 0 24 24"><polyline points="9,14 4,9 9,4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
      <span class="tbl" style="color:var(--danger)">Cofnij</span>
    </button>
    <button class="tb red" onclick="if(confirm('Wyczyścić?')){Canvas.clearAll();updatePanel()}">
      <svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      <span class="tbl" style="color:var(--danger)">Czyść</span>
    </button>
  </div>
  <div class="sp"></div>
  <div class="sbadge" id="sess-badge">—</div>
  <button style="margin-left:10px;height:34px;padding:0 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer" onclick="exportPDF()">Eksport PDF</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="cwrap" id="cwrap">
    <canvas id="c"></canvas>
    <div class="hintbar" id="hint"></div>

    <!-- QR OVERLAY -->
    <div class="qrov" id="qrov">
      <div class="qrbox">
        <h3>Zeskanuj telefonem</h3>
        <p>Otwórz aparat i zeskanuj — przejdziesz do strony dodawania zdjęć</p>
        <div id="qr-render"></div>
        <div class="qrcnt" id="qr-count">0</div>
        <div class="qrcntl">odebrano zdjęć</div>
        <button class="qrcls" onclick="closeQR()">Zamknij</button>
      </div>
    </div>
  </div>

  <!-- PANEL BOCZNY -->
  <div class="side" id="side">
    <div id="panel-empty">
      <div class="nosel">
        <svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z"/></svg>
        Zaznacz element<br>aby edytować<br>wymiary i etykietę
      </div>
    </div>
    <div id="panel-editor" style="display:none;flex-direction:column;gap:12px">
      <div>
        <div class="plbl" style="margin-bottom:10px">Wymiary</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div class="drow">
            <span class="dkey" id="lbl-w">Szer.</span>
            <div class="dfield"><input id="inp-w" type="number" min="1" placeholder="—" inputmode="decimal"><span class="dunit">mm</span></div>
          </div>
          <div class="drow" id="row-h">
            <span class="dkey" id="lbl-h">Wys.</span>
            <div class="dfield"><input id="inp-h" type="number" min="1" placeholder="—" inputmode="decimal"><span class="dunit">mm</span></div>
          </div>
        </div>
      </div>
      <div>
        <div class="plbl" style="margin-bottom:10px">Etykieta</div>
        <textarea id="inp-lbl" class="larea" placeholder="np. witryna lewa…" rows="3"></textarea>
      </div>
      <button class="abtn" onclick="applyEdits()">Zastosuj ↵</button>
      <button class="dbtn" onclick="Canvas.deleteSelected();updatePanel()">Usuń element</button>
    </div>
  </div>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <button class="qrbtn" onclick="openQR()">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="17" y="17" width="4" height="4" rx="1"/></svg>
    <span>QR FOTO</span>
  </button>
  <div class="ptray" id="photo-tray">
    <span class="etray">Brak zdjęć — zeskanuj QR telefonem</span>
  </div>
  <button class="sndbtn" onclick="sendReport()">Wyślij raport</button>
</div>

</div>

<!-- SKRYPTY -->
<script src="config.js"></script>
<script src="src/js/canvas.js"></script>
<script src="src/js/session.js"></script>
<script src="src/js/polling.js"></script>
<script src="src/js/offlineQueue.js"></script>
<script src="src/js/pdf.js"></script>
<script>
var _photos = [];
var _qrOpen = false;

// ── EKRAN STARTOWY ─────────────────────────────────────────────────────────
function startSession() {
  var name = document.getElementById('start-input').value.trim();
  if (!name) name = 'Klient';
  var sess = Session.create(name);
  document.getElementById('sess-badge').textContent = sess.clientName;
  document.getElementById('start-screen').style.display = 'none';
  Canvas.init(document.getElementById('c'), onShapeSelected);
  Polling.start(sess.sessionId, onNewPhotos, null);
  OfflineQueue.init();
}

document.getElementById('start-btn').addEventListener('click', startSession);
document.getElementById('start-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') startSession();
});

// Przywróć sesję jeśli istnieje
window.addEventListener('load', function() {
  var restored = Session.restore();
  if (restored) {
    document.getElementById('sess-badge').textContent = restored.clientName;
    document.getElementById('start-screen').style.display = 'none';
    Canvas.init(document.getElementById('c'), onShapeSelected);
    Polling.start(restored.sessionId, onNewPhotos, null);
    OfflineQueue.init();
  }
});

// ── TRYBY ──────────────────────────────────────────────────────────────────
function setMode(m) {
  Canvas.setMode(m);
  ['select','rect','circle','line'].forEach(function(id) {
    var el = document.getElementById('tb-'+id);
    if (el) el.classList.toggle('active', id === m);
  });
  var hints = {rect:'Przeciągnij aby narysować prostokąt',circle:'Przeciągnij aby narysować koło',line:'Przeciągnij aby narysować linię'};
  if (hints[m]) showHint(hints[m]);
}

function showHint(msg, ms) {
  var h = document.getElementById('hint');
  h.textContent = msg; h.classList.add('show');
  clearTimeout(h._t); h._t = setTimeout(function(){ h.classList.remove('show'); }, ms || 2500);
}

// ── PANEL ──────────────────────────────────────────────────────────────────
function onShapeSelected(shape) { updatePanel(shape); }

function updatePanel(shape) {
  shape = shape || Canvas.getSelected();
  var empty = document.getElementById('panel-empty');
  var editor = document.getElementById('panel-editor');
  if (!shape) { empty.style.display='block'; editor.style.display='none'; return; }
  empty.style.display='none'; editor.style.display='flex';
  var rowH = document.getElementById('row-h');
  document.getElementById('lbl-w').textContent = shape.type==='circle'?'Śred.':shape.type==='line'?'Dług.':'Szer.';
  rowH.style.display = (shape.type==='circle'||shape.type==='line')?'none':'flex';
  document.getElementById('inp-w').value = shape.dimW || '';
  document.getElementById('inp-h').value = shape.dimH || '';
  document.getElementById('inp-lbl').value = shape.label || '';
}

function applyEdits() {
  var s = Canvas.getSelected(); if (!s) return;
  var w = parseFloat(document.getElementById('inp-w').value) || 0;
  var h = parseFloat(document.getElementById('inp-h').value) || 0;
  var lbl = document.getElementById('inp-lbl').value.trim();
  Canvas.updateShape(s.id, { dimW: w>0?Math.round(w):s.dimW, dimH: h>0?Math.round(h):s.dimH, label: lbl });
  showHint('Zmiany zastosowane ✓');
}

// ── QR ─────────────────────────────────────────────────────────────────────
function openQR() {
  _qrOpen = true;
  document.getElementById('qrov').classList.add('open');
  var el = document.getElementById('qr-render');
  el.innerHTML = '';
  try { Session.renderQR(el, 200); } catch(e) { el.textContent = 'Brak sesji'; }
  document.getElementById('qr-count').textContent = _photos.length;
}
function closeQR() { _qrOpen=false; document.getElementById('qrov').classList.remove('open'); }

// ── POLLING ────────────────────────────────────────────────────────────────
function onNewPhotos(photos) {
  photos.forEach(function(p) {
    _photos.push(p);
    var tray = document.getElementById('photo-tray');
    var emp = tray.querySelector('.etray'); if (emp) emp.remove();
    var chip = document.createElement('div'); chip.className='pchip';
    chip.textContent = p.description || p.timestamp.slice(0,10);
    chip.title = p.driveUrl || '';
    if (p.driveUrl) chip.onclick = function(){ window.open(p.driveUrl,'_blank'); };
    tray.appendChild(chip);
  });
  if (_qrOpen) document.getElementById('qr-count').textContent = _photos.length;
  showHint('📸 Nowe zdjęcie odebrane!');
}

// ── PDF ────────────────────────────────────────────────────────────────────
function exportPDF() {
  PDFGenerator.generate({
    clientName: Session.getClientName(),
    date: new Date().toLocaleDateString('pl-PL'),
    sessionId: Session.getSessionId(),
    canvasEl: Canvas.getCanvas(),
    photos: _photos,
  });
}
function sendReport() { exportPDF(); showHint('Raport pobrany ✓', 3000); }
</script>
</body>
</html>
